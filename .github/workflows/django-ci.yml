name: Django Pip CI
on:
  pull_request:
    branches: ["main"]
jobs:
  django-check:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-dummy-secret-key
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: styleflow.settings
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4
      - name: Python 3.10 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: pip 업그레이드
        run: python -m pip install --upgrade pip
      - name: 패키지 설치
        run: pip install -r requirements.txt
      - name: Django 문법 및 설정 체크
        run: python backend/manage.py check